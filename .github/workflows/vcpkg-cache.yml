


name: Update vcpkg cache

on:
  pull_request_target:
    branches: [main]
    tags: ["*"]
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency: vcpkg-cache

jobs:
  vcpkg:
    name: Cache
    runs-on: windows-latest
    # vcpkg-install.sh ignores caches in forks
    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          # we run in pull_request_target; checking out the PR branch is unsafe
          ref: main
      - name: vcpkg install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/vcpkg-install.sh
